name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3-dev \
            autoconf automake libtool pkg-config cmake \
            libffi-dev libssl-dev zlib1g-dev \
            zip unzip lzma ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Set up Android SDK inside buildozer directory
        run: |
          # Именно сюда buildozer смотрит — создаём SDK здесь
          BSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$BSDK/cmdline-tools"

          # Скачиваем command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools "$BSDK/cmdline-tools/latest"

          SDKMANAGER="$BSDK/cmdline-tools/latest/bin/sdkmanager"

          # Принимаем лицензии
          mkdir -p "$BSDK/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$BSDK/licenses/android-sdk-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$BSDK/licenses/android-sdk-preview-license"

          # Устанавливаем нужные пакеты
          "$SDKMANAGER" --sdk_root="$BSDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          # Создаём симлинк tools/bin/sdkmanager — именно этот путь ищет buildozer
          mkdir -p "$BSDK/tools/bin"
          ln -sf "$SDKMANAGER" "$BSDK/tools/bin/sdkmanager"

          echo "SDK setup done:"
          ls "$BSDK/"
          ls "$BSDK/tools/bin/"

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTestPro-APK
          path: bin/*.apk

      - name: Show log tail on failure
        if: failure()
        run: tail -200 build.log || true
