name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # ── Python ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Java 17 (обязательно для Android Gradle) ──
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Системные зависимости ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
            autoconf automake libtool pkg-config cmake \
            libffi-dev libssl-dev \
            zip unzip lzma \
            ccache

      # ── Кеш .buildozer (ускоряет повторные сборки) ──
      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      # ── Android SDK Command-line tools ──
      - name: Set up Android SDK
        run: |
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          cd "$HOME/android-sdk/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # ── Принятие лицензий SDK (без интерактивного yes | ...) ──
      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$HOME/android-sdk/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > "$HOME/android-sdk/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> "$HOME/android-sdk/licenses/android-sdk-license"
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > "$HOME/android-sdk/licenses/android-sdk-preview-license"
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> "$HOME/android-sdk/licenses/android-sdk-license"

      # ── Buildozer + Cython ──
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── Сборка APK ──
      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Всегда загружаем лог (даже при падении) ──
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      # ── APK при успехе ──
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTestPro-APK
          path: bin/*.apk

      # ── Если упало — показываем хвост лога ──
      - name: Show log tail on failure
        if: failure()
        run: tail -100 build.log || true
